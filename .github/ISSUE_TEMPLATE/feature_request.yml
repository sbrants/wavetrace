name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For large ideas, check [Goal.md](https://github.com/sbrants/wavetrace/blob/main/Goal.md) and [docs/future-capabilities.md](https://github.com/sbrants/wavetrace/blob/main/docs/future-capabilities.md) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve for Tower players?
      placeholder: I'm always frustrated when …
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like WaveTrace to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or simpler approaches

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small UI tweak
        - Scanner / OCR behavior
        - History / analytics
        - New platform support
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this (see CONTRIBUTING.md)
          required: false
