# Re-build and upload the Store MSIX when the release job failed on flaky crates.io downloads.
# Uses the workflow file from main; checks out the tagged release sources.
name: Store MSIX retry

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach the MSIX to (e.g. v0.2.25)
        required: true
        type: string

permissions:
  contents: write

jobs:
  store-msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Microsoft Store MSIX
        shell: pwsh
        env:
          CARGO_NET_RETRY: 10
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            npm run tauri:store:build
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "MSIX build attempt $attempt failed, retrying in 30s..."
            Start-Sleep -Seconds 30
          }
          exit 1

      - name: Upload MSIX to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          files: microsoft-store/out/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
