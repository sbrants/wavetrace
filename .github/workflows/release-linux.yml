name: Release Linux

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libtesseract-dev \
            tesseract-ocr-eng \
            libpipewire-0.3-dev \
            libspa-0.2-dev

      - name: Build AppImage
        run: |
          npm ci
          npm run tauri build -- --bundles appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: wavetrace-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm \
            base-devel git nodejs npm rust patchelf \
            gtk3 webkit2gtk-4.1 librsvg libappindicator-gtk3 \
            tesseract tesseract-data-eng openssl pkgconf \
            pipewire libpipewire

      - name: Build release binary
        run: |
          npm ci
          npm run tauri build -- --bundles deb

      - name: Upload Arch binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: wavetrace-arch-x86_64
          path: src-tauri/target/release/wavetrace

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [appimage, arch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.AppImage
            dist/wavetrace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
