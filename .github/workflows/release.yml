name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WaveTrace ${{ github.ref_name }}
          body: |
            See [CHANGELOG.md](https://github.com/sbrants/wavetrace/blob/main/CHANGELOG.md) for details.

            **Auto-update:** release builds check GitHub for updates on startup.
            - Windows: NSIS installer
            - Linux (incl. Arch): AppImage

            **Microsoft Store:** unsigned `Meringue.WaveTrace_*_x64.msix` is attached by CI — upload to Partner Center (see [microsoft-store/README.md](https://github.com/sbrants/wavetrace/blob/main/microsoft-store/README.md)).
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-24.04
            args: "--bundles appimage"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Require updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Add the contents of wavetrace.key to GitHub Actions secrets (see README)."
            exit 1
          fi

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libtesseract-dev \
            tesseract-ocr-eng \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            lld \
            libgbm-dev

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: ${{ matrix.platform == 'windows-latest' }}
          args: ${{ matrix.args }}

  store-msix:
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Microsoft Store MSIX
        shell: pwsh
        run: npm run tauri:store:build

      - name: Upload MSIX to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: microsoft-store/out/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  arch-binary:
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm \
            base-devel git nodejs npm rust patchelf \
            gtk3 webkit2gtk-4.1 librsvg libappindicator-gtk3 \
            tesseract tesseract-data-eng openssl pkgconf \
            pipewire libpipewire clang

      - name: Build Arch binary
        run: |
          npm ci
          npm run tauri build -- --config src-tauri/tauri.arch.ci.conf.json --bundles deb

      - name: Upload Arch binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/wavetrace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
