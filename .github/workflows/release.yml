name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WaveTrace ${{ github.ref_name }}
          body: |
            See [CHANGELOG.md](https://github.com/sbrants/wavetrace/blob/main/CHANGELOG.md) for details.

            **Auto-update:** release builds check GitHub for updates on startup.
            - Windows: NSIS installer
            - macOS: in-app update (Apple Silicon + Intel)
            - Linux (incl. Arch): AppImage

            **Microsoft Store:** unsigned `Meringue.WaveTrace_*_x64.msix` is attached by CI — upload to Partner Center (see [microsoft-store/README.md](https://github.com/sbrants/wavetrace/blob/main/microsoft-store/README.md)).
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-24.04
            args: "--bundles appimage"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Require updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Add the contents of wavetrace.key to GitHub Actions secrets (see README)."
            exit 1
          fi

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libtesseract-dev \
            tesseract-ocr-eng \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            lld \
            libgbm-dev

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # latest.json is assembled once in publish-latest-json (avoids parallel upload races).
          includeUpdaterJson: false
          retryAttempts: 3
          args: ${{ matrix.args }}

  build-macos:
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
            runner: macos-14
          - target: x86_64-apple-darwin
            arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Require updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Add the contents of wavetrace.key to GitHub Actions secrets (see README)."
            exit 1
          fi

      - name: Install macOS build dependencies
        run: brew install tesseract leptonica

      - name: Build macOS app bundle
        run: |
          chmod +x scripts/bundle-macos-deps.sh scripts/package-macos-dmg.sh scripts/package-macos-updater.sh
          npm run tauri build -- --target ${{ matrix.target }} --bundles app --config src-tauri/tauri.macos.ci.conf.json

      - name: Bundle Tesseract into .app
        run: bash scripts/bundle-macos-deps.sh ${{ matrix.target }}

      - name: Create updater bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/package-macos-updater.sh ${{ matrix.target }} ${{ matrix.arch }}

      - name: Create DMG
        run: bash scripts/package-macos-dmg.sh ${{ matrix.target }} ${{ matrix.arch }}

      - name: Upload macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/WaveTrace_*_macos_${{ matrix.arch }}.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/WaveTrace_*_macos_${{ matrix.arch }}.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/WaveTrace_*_macos_${{ matrix.arch }}.app.tar.gz.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-latest-json:
    needs: [create-release, build, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ github.ref_name }}" --dir release-assets --repo "${{ github.repository }}"

      - name: Build latest.json
        run: node scripts/publish-latest-json.mjs release-assets > latest.json

      - name: Upload latest.json
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  store-msix:
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Microsoft Store MSIX
        shell: pwsh
        run: npm run tauri:store:build

      - name: Upload MSIX to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: microsoft-store/out/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  arch-binary:
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install Arch build dependencies
        run: |
          packages=(
            base-devel git nodejs npm rust patchelf
            gtk3 webkit2gtk-4.1 librsvg libappindicator-gtk3
            tesseract tesseract-data-eng openssl pkgconf
            pipewire libpipewire clang
          )
          for attempt in 1 2 3 4 5; do
            if pacman -Syu --noconfirm "${packages[@]}"; then
              exit 0
            fi
            echo "pacman attempt $attempt failed, syncing DB and retrying in 30s..."
            pacman -Syy --noconfirm || true
            sleep 30
          done
          exit 1

      - name: Build Arch binary
        env:
          CARGO_NET_RETRY: 10
        run: |
          npm ci
          for attempt in 1 2 3; do
            npm run tauri build -- --config src-tauri/tauri.arch.ci.conf.json --bundles deb && exit 0
            echo "Build attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
          exit 1

      - name: Upload Arch binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/wavetrace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
